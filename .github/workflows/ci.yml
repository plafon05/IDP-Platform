name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache-dependency-path: backend/go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  integration:
    name: Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: idp_test
          POSTGRES_USER: idp
          POSTGRES_PASSWORD: idp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U idp -d idp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      TEST_DATABASE_URL: postgres://idp:idp@localhost:5432/idp_test?sslmode=disable
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache-dependency-path: backend/go.sum

      - name: Integration tests
        run: go test ./integration -count=1 -v

  containers:
    name: Containers and production config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build application images
        run: docker compose build backend frontend

      - name: Create temporary TLS certificate
        run: >-
          mkdir -p /tmp/idp-nginx-tls &&
          openssl req -x509 -newkey rsa:2048 -nodes
          -keyout /tmp/idp-nginx-tls/privkey.pem
          -out /tmp/idp-nginx-tls/fullchain.pem
          -days 1 -subj '/CN=localhost'

      - name: Validate production nginx
        run: >-
          docker run --rm
          --add-host backend:127.0.0.1
          --add-host frontend:127.0.0.1
          --add-host minio:127.0.0.1
          -v "$PWD/nginx/idp-platform.prod.conf:/etc/nginx/conf.d/default.conf:ro"
          -v /tmp/idp-nginx-tls:/etc/nginx/tls:ro
          nginx:1.27-alpine nginx -t

      - name: Validate production Compose
        env:
          PUBLIC_URL: https://idp.example.test
          TLS_CERT_DIR: /tmp/idp-nginx-tls
          BACKEND_IMAGE: idp-platform-backend:local
          FRONTEND_IMAGE: idp-platform-frontend:local
          POSTGRES_DB: idp
          POSTGRES_USER: idp
          POSTGRES_PASSWORD: test-password
          DATABASE_URL: postgres://idp:test-password@postgres:5432/idp?sslmode=disable
          REDIS_PASSWORD: test-password
          REDIS_URL: redis://:test-password@redis:6379/0
          JWT_SECRETS: v1:test-secret
          MINIO_ROOT_USER: minio-test
          MINIO_ROOT_PASSWORD: test-password

          MINIO_ACCESS_KEY: minio-app
          MINIO_SECRET_KEY: test-password
          SMTP_HOST: smtp.example.test
          SMTP_PORT: "587"
          SMTP_FROM_EMAIL: noreply@example.test
        run: docker compose --profile tools -f docker-compose.prod.yml config -q

      - name: Validate operations scripts
        run: bash -n scripts/backup-production.sh scripts/restore-production.sh
