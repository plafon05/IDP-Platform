name: Publish production images

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: idp_test
          POSTGRES_USER: idp
          POSTGRES_PASSWORD: idp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U idp -d idp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://idp:idp@localhost:5432/idp_test?sslmode=disable
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache-dependency-path: backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Backend checks
        working-directory: backend
        run: go vet ./... && go test ./... -count=1

      - name: Frontend build
        working-directory: frontend
        run: npm ci && npm run build

  publish:
    name: Publish ${{ matrix.name }}
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="$GITHUB_REF_NAME"
          else
            version="manual-${GITHUB_SHA::12}"
          fi
          echo "name=ghcr.io/${repository}-${{ matrix.name }}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build and publish
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.version }}
            ${{ steps.image.outputs.name }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: mode=max
          sbom: true
